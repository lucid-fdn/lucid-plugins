lucid: "1.0"
name: lucid-tax
version: "2.0.0"
description: "Crypto tax compliance — AI brain layer with verdicts (OPTIMIZE/COMPLIANT/ACTION_NEEDED/AUDIT_RISK), cost-basis calculation, tax-loss harvesting, multi-method optimization"
author: "Lucid"
license: "MIT"

requires:
  mcps:
    - "@modelcontextprotocol/sdk"
  env:
    - TAX_SUPABASE_URL
    - TAX_SUPABASE_KEY
    - TAX_ETHERSCAN_API_KEY
    - TAX_COINGECKO_API_KEY

skills:
  # Core tools (12)
  - tax_import_wallet
  - tax_classify_transactions
  - tax_calculate_gains
  - tax_get_summary
  - tax_generate_report
  - tax_find_harvesting
  - tax_get_cost_basis
  - tax_track_income
  - tax_compare_methods
  - tax_get_unrealized
  - tax_audit_transactions
  - tax_status
  # Brain tools (5)
  - lucid_tax_analyze
  - lucid_tax_optimize
  - lucid_tax_harvest
  - lucid_tax_health
  - lucid_tax_pro

platforms:
  claude-code: true
  openclaw: true

entry:
  mcp: src/bin.ts
  openclaw: src/openclaw.ts

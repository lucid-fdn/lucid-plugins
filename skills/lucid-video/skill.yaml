lucid: "1.0"
name: lucid-video
version: "1.0.0"
description: "Agent-native video generation using Remotion — marketing content, data reports, personalized outreach"
author: "RaijinLabs"
license: "MIT"

requires:
  mcps: []
  env:
    - VIDEO_ENGINE_URL  # required — rendering engine base URL
  env_optional:
    - VIDEO_ENGINE_API_KEY
    - VIDEO_SUPABASE_URL
    - VIDEO_SUPABASE_KEY
    - VIDEO_TENANT_ID
    - VIDEO_DEFAULT_PRIORITY
    - VIDEO_DEFAULT_FORMAT
    - VIDEO_DEFAULT_RESOLUTION

skills:
  - social-content
  - data-reports
  - personalized-outreach

heartbeat: HEARTBEAT.md
platforms:
  claude-code: true
  openclaw: true
